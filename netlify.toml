# Netlify configuration for LearnTrack frontend

[build]
  command = "npm run build"
  publish = "dist/learntrack-angular"

[build.environment]
  NODE_VERSION = "22"

# Redirect all API calls to the backend (Render)
[[redirects]]
  from = "/api/*"
  to = "https://learntrack-backend-itvq.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback: all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"